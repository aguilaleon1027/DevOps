name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-and-build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        # Only login if it's a push event to a branch (not PR), assuming we only push images on merge to main
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          # Push only when pushing to main branch, not on PRs
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/workout-recommendation-api:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/workout-recommendation-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/workout-recommendation-api:buildcache,mode=max

  deploy:
    name: Deploy to Local Self-Hosted Runner
    needs: test-and-build
    if: github.event_name != 'pull_request'
    # Use the self-hosted local computer
    runs-on: self-hosted

    steps:
      - name: Stop and remove existing container
        run: |
          docker stop workout-api
          docker rm workout-api
        continue-on-error: true

      - name: Pull the latest image
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/workout-recommendation-api:latest

      - name: Run the new container
        run: docker run -d --name workout-api -p 8000:8000 --restart unless-stopped ${{ secrets.DOCKERHUB_USERNAME }}/workout-recommendation-api:latest
