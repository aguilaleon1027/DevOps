<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Recommender | AI MLOps</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="background-mesh"></div>

    <div class="container">
        <header class="header">
            <h1>AI Workout <span class="accent">Generator</span></h1>
            <p>Personalized training programs powered by PyTorch</p>
        </header>

        <main class="main-content">
            <!-- Form Card -->
            <section class="glass-card form-section" id="formSection">
                <form id="workoutForm">
                    <h2 class="section-title">Your Profile</h2>

                    <div class="input-group">
                        <label for="age">Age</label>
                        <input type="number" id="age" required min="10" max="100" placeholder="e.g. 28">
                    </div>

                    <div class="input-group">
                        <label for="gender">Gender</label>
                        <select id="gender" required>
                            <option value="" disabled selected>Select gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <h2 class="section-title">Your Goals</h2>

                    <div class="input-group">
                        <label for="currentWeight">Current Weight (kg)</label>
                        <input type="number" step="0.1" id="currentWeight" required placeholder="e.g. 70.5">
                    </div>

                    <div class="input-group">
                        <label for="targetWeight">Target Weight (kg)</label>
                        <input type="number" step="0.1" id="targetWeight" required placeholder="e.g. 75.0">
                    </div>

                    <div class="input-group">
                        <label for="primaryGoal">Primary Training Goal</label>
                        <select id="primaryGoal" required>
                            <option value="" disabled selected>Select your main goal</option>
                            <option value="strength">Strength & Power</option>
                            <option value="bodybuilding">Bodybuilding / Muscle Size</option>
                            <option value="diet">Diet / Fat Loss</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="targetMuscle">Target Muscle Mass (kg, Optional)</label>
                        <input type="number" step="0.1" id="targetMuscle" placeholder="e.g. 2.5">
                    </div>

                    <button type="submit" class="submit-btn" id="submitBtn">Generate Plan</button>
                </form>
            </section>

            <!-- Loading Spinner (Hidden by default) -->
            <div class="loading-container hidden" id="loadingSection">
                <div class="spinner"></div>
                <p>Analyzing architecture...</p>
            </div>

            <!-- Results Card (Hidden by default) -->
            <section class="glass-card result-section hidden" id="resultSection">
                <div class="result-header">
                    <h2>Your Custom Program</h2>
                    <span class="badge difficulty" id="resDifficulty">Intermediate</span>
                </div>

                <h3 class="program-title" id="resProgramName">Hypertrophy Split</h3>
                <p class="duration">Estimated Duration: <span id="resDuration">60</span> minutes</p>

                <div class="exercises-container" id="resExercises">
                    <!-- Javascript will populate this -->
                </div>

                <button class="reset-btn" id="resetBtn">Generate Another</button>
            </section>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>

</html>
